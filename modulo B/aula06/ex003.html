<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa...</title>
    <style>
        body {
            background-color: black;
            color: white;   /* Comentario em CSS */
            font: normal 20pt Arial;
        }

        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Ola, mundo!</h1> <!-- Isso e um comentario -->
    <p>Ja me livrei da maldicao</p>
    <script>
       var n1 = Number.parseInt(window.prompt('Digite um numero: ')) // Para numeros inteiro
       var n2 = Number.parseFloat(window.prompt('Digite outro numero: ')) // Para numeros reais
       var s = n1 + n2
       // Number , para o propio JavaScript decidir
       window.alert(`A soma entre ${n1} e ${n2} igual a ${s}`)
       // + para adicao
       // + para concatenacao
    </script>
</body>
</html>
