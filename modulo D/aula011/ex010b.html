<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NACIONALIDADE</title>
</head>
<body>
    <h1>Sua nacionalidade</h1>
    Em qual pais voce nasceu: <input type="text" name="nasc" id="nasc">
    <input type="button" value="verificar" onclick="calcular()">
    <div id="res"></div>

    <script>
        function calcular() {
            var nsc = document.querySelector('input#nasc')
            var pais = (nsc.value)
            var res = document.querySelector('div#res')
            
            res.innerHTML = `<p>Voce nasceu no ${pais}</p>`
            if (pais == "Brasil" || pais == "brasil") {
                res.innerHTML += 'Voce e brasileiro!'
            } else {
                res.innerHTML += 'Voce e estrangeiro!'
            }
        }
    </script>
</body>
</html>
